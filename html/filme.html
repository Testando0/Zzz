<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filme</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Remove 'cursor: pointer;' para não confundir, já que a interação será no iframe */
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            /* Adiciona flexbox para garantir que o iframe preencha 100% */
            display: block; 
        }
    </style>
</head>
<body>
    <iframe id="videoPlayer" frameborder="0" allowfullscreen></iframe>

    <script>
        // Não precisamos mais da chave TMDB, pois ela não era usada para o player
        let filmeId = new URLSearchParams(window.location.search).get("id");
        
        // 1. Monta a URL do player
        const playerUrl = `https://superflixapi.lat/filme/${filmeId}`;
        
        // 2. Define o src do iframe imediatamente
        const videoPlayer = document.getElementById("videoPlayer");
        
        // Verificação se o ID existe
        if (filmeId) {
            videoPlayer.src = playerUrl;
        } else {
            // Caso não tenha ID, mostre algo no iframe
            videoPlayer.src = "about:blank"; 
            alert("Erro: ID do filme não encontrado na URL.");
        }
        
        // REMOVEMOS:
        // - A função loadFilmeDetails()
        // - A chamada à API do TMDB
        // - Toda a lógica de playVideoAndFullscreen() e o listener de clique
        
    </script>
</body>
</html>
